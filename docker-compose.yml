version: '3.8'

services:
  trustlayer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trustlayer-app
    ports:
      - "4000:4000"
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
